# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    # Incompatible with some Terraform features: https://github.com/tenable/terrascan/issues/1331
    - terrascan
  enabled:
    - renovate@43.249.5
    - tofu@1.12.3
    - terraform@1.1.0
    - actionlint@1.7.12
    - checkov@3.3.6
    - git-diff-check
    - markdownlint@0.49.0
    - prettier@3.9.4
    - tflint@0.63.1
    - trivy@0.72.0
    - trufflehog@3.95.7
    - yamllint@1.38.0
    - zizmor@1.26.1
  definitions:
    - name: zizmor
      environment:
        # Optional token here so that it's not needed locally, but can be used
        # when trunk is called from our lint workflow in GHA
        - name: ZIZMOR_GITHUB_TOKEN
          value: ${env.GITHUB_TOKEN}
          optional: true
      commands:
        # Set to pedantic so that zizmor will run its stale-action-refs audit rule
        - name: lint
          run: zizmor --format=sarif --persona=pedantic ${target}
  ignore:
    - linters: [tofu]
      paths:
        - "**/backend.tf.json"
    # Ignore CHANGELOG.md as release-please manages this file
    - linters: [ALL]
      paths:
        - "**/CHANGELOG.md"
actions:
  enabled:
    - terraform-docs
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
